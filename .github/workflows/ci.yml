name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Auditoría de CVEs en dependencias fijadas
        run: pip-audit -r requirements.txt --no-deps --disable-pip
      - name: Self-checks de los módulos
        run: |
          python models.py
          python extract.py
          python detector.py
      - name: Tests (incluye suite adversarial con LLM mockeado)
        # OLLAMA_URL a un puerto muerto: garantiza que nada llama a un LLM real
        run: OLLAMA_URL=http://localhost:9 pytest tests/ -q
